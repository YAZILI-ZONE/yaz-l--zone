<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazılı-Zone | LGS Portal</title>
    <style>
        :root {
            --header-turuncu: #ff6f00;
            --menu-yesil: #2ecc71;
            --arka-plan: #f4f7f6;
            --yazi: #333;
            --koyu-mavi: #2c3e50;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--arka-plan); margin: 0; padding: 0; color: var(--yazi); }
        
        /* HEADER */
        header { background: var(--header-turuncu); color: white; padding: 40px 20px; text-align: center; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu-icon { font-size: 35px; cursor: pointer; position: absolute; left: 25px; top: 25px; color: white; }

        /* YAN MENÜ */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: var(--koyu-mavi); overflow-x: hidden; transition: 0.5s; padding-top: 60px; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: white; display: block; margin: 5px 15px; border-radius: 8px; text-align: center; font-weight: bold; background: var(--menu-yesil); }
        .sidebar .close-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; cursor: pointer; }

        /* 3 SÜTUNLU YAPI */
        .ana-konteyner { display: flex; gap: 20px; padding: 25px; max-width: 1450px; margin: 0 auto; align-items: flex-start; }
        .sol-sutun { flex: 1; min-width: 250px; }
        .orta-sutun { flex: 2; min-width: 400px; }
        .sag-sutun { flex: 1; min-width: 250px; }

        /* KUTULAR */
        .kutu { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid var(--menu-yesil); }
        .orta-sutun .kutu { border-top-color: var(--header-turuncu); }
        .sag-sutun .kutu { border-top-color: #3498db; }

        .not-buton { display: block; width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; background: var(--menu-yesil); transition: 0.3s; box-sizing: border-box; }
        .not-buton:hover { background: #27ae60; transform: translateX(5px); }

        .btn-6 { background: #42a5f5; }
        .btn-7 { background: #ffa726; }
