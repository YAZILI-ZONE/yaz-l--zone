<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazılı-Zone | LGS Hazırlık</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        header { background: #ff5722; color: white; padding: 20px; border-radius: 10px; }
        .kutu { background: white; margin: 20px auto; padding: 20px; border-radius: 10px; max-width: 600px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: left; }
        .buton { background: #ff5722; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; text-decoration: none; display: inline-block; }
        .cevap-btn { background: #333; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .soru-alani { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Yazılı-Zone Hazırlık Merkezi</h1>
    <p>Sınava Hazırlanmanın En Eğlenceli Yolu</p>
</header>

<div class="kutu" style="text-align:center;">
    <h2>🎯 Günün Sorusu</h2>
    <p>Sınıfını Seç:</p>
    <button class="buton" onclick="goster('s8')">8. Sınıf</button>
    <button class="buton" onclick="alert('Yakında eklenecek!')">Diğer Sınıflar</button>

    <div id="s8" class="soru-alani">
        <h3 style="color:#ff5722;">8. Sınıf 2. Dönem Matematik</h3>
        
        <p><b>Soru 1:</b> 2x + 5 = 15 ise x kaçtır?</p>
        <button class="cevap-btn" onclick="this.style.background='green'; alert('Doğru!')">5</button>
        <button class="cevap-btn" onclick="this.style.background='red'; alert('Yanlış!')">10</button>

        <p><b>Soru 2:</b> Hangisi bir doğrusal denklem grafiğidir?</p>
        <button class="cevap-btn" onclick="alert('Doğru!')">y = 2x + 1</button>
        <button class="cevap-btn" onclick="alert('Yanlış!')">y = x²</button>
    </div>
</div>

<div class="kutu" style="text-align:center;">
    <h2>📚 Kaynaklar</h2>
    <a href="8.sınıfmatematikyazılısı.pdf" class="buton" download>PDF İndir</a>
</div>

<script>
    function goster(id) {
        document.getElementById(id).style.display = 'block';
    }
</script>

</body>
</html>
